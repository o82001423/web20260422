<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 程式基礎練習</title>
</head>
<style>
    table {
        border-collapse: collapse;
        width: 100%;
    }

    td,
    th {
        border: 10px solid #dddddd;
        text-align: center;
        padding: 100px;
    }
</style>

<Body>
    <table>
        <tr>
            <th colspan="2">a</th>
            <!--<th>b</th> --->
            <th>c</th>
        </tr>
        <tr>
            <td>1</td>
            <td>2</td>
            <td rowspan="2">3</td>
        </tr>
        <tr>
            <td>4</td>
            <td>5</td>
            <!--<td>6</td>-->
        </tr>
    </table>
</Body>
